name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  scaffold-smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17 (Nextflow runtime)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Nextflow
        run: |
          curl -s https://get.nextflow.io | bash
          sudo mv nextflow /usr/local/bin/
          nextflow -v

      - name: Run scaffold smoke test
        run: |
          nextflow run main.nf -profile laptop \
            --input tests/data/toy_patient.vcf \
            --outdir results/

      - name: Verify expected output exists
        run: |
          test -f results/hello.txt
          cat results/hello.txt

      - name: Lint shell scripts
        run: |
          if compgen -G "scripts/*.sh" > /dev/null; then
            sudo apt-get install -y shellcheck
            shellcheck scripts/*.sh
          fi

  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for em dashes in repo markdown
        run: |
          # Project style: never use em dashes
          if grep -rn --include='*.md' '—' .; then
            echo "Em dashes found. Replace with commas, semicolons, colons, or separate sentences."
            exit 1
          fi
