name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  case-study-scorecard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11 (tomllib)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run cohort_visualize unit tests
        run: |
          python3 -m unittest tests.test_cohort_visualize -v

      - name: Run annotator unit tests
        run: |
          python3 -m unittest tests.test_annotators -v

      - name: Run phase 5 tier-classifier unit tests
        run: |
          python3 -m unittest tests.test_phase5_tier -v

      - name: Run cohort portfolio unit tests
        run: |
          python3 -m unittest tests.test_cohort_portfolio -v

      - name: Run DGIdb fetcher filter unit tests
        run: |
          python3 -m unittest tests.test_fetch_dgidb_filters -v

      - name: Run case-study scorecard (Python-only, no Nextflow)
        run: |
          python3 bin/check_case_studies.py --quiet

      - name: Upload scorecard artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scorecard
          path: results/scorecard.*

  nextflow-end-to-end:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17 (Nextflow runtime)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Nextflow
        run: |
          curl -s https://get.nextflow.io | bash
          sudo mv nextflow /usr/local/bin/
          nextflow -v

      - name: Run pipeline on TOY_TUMOR (default fixture)
        run: |
          nextflow run main.nf -profile laptop_nodocker --outdir results/

      - name: Verify expected report files
        run: |
          test -f results/phase1/TOY_TUMOR.phase1.tsv
          test -f results/phase5/TOY_TUMOR.phase5.tsv
          test -f results/phase5/TOY_TUMOR.report.md
          head -20 results/phase5/TOY_TUMOR.report.md

      - name: Run pipeline on TOY_FP_CDK4 (CNA + fusion fixture)
        run: |
          nextflow run main.nf -profile laptop_nodocker \
            --input  tests/data/toy_fp_cdk4amp.vcf \
            --cna    tests/data/toy_fp_cdk4amp.cna.tsv \
            --fusion tests/data/toy_fp_cdk4amp.fusion.tsv \
            --sample_id TOY_FP_CDK4 \
            --subtype FP \
            --outdir results/

      - name: Verify CNA + fusion fixture report
        run: |
          test -f results/phase5/TOY_FP_CDK4.report.md
          head -25 results/phase5/TOY_FP_CDK4.report.md

  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for em dashes in committed markdown
        run: |
          if grep -rn --include='*.md' '—' .; then
            echo "Em dashes found. Replace with commas, semicolons, colons, or separate sentences."
            exit 1
          fi
